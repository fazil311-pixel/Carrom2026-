<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom Multi-Link Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.20.0/build/cannon.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family: 'Segoe UI', sans-serif; background:#0a0a0a; color:#fff; overflow:hidden}
        canvas{display:block}

        /* UI Screens */
        .overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); z-index: 2000; }
        .card { background: #1a1a1a; border: 2px solid #FFD700; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        .hidden { display: none !important; }

        /* Controls */
        #gameUI { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; pointer-events: none; z-index: 100; }
        .slider-box { pointer-events: auto; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 50px; border: 1px solid #FFD700; }
        input[type=range] { width: 100%; accent-color: #FFD700; }
        
        #scoreBoard { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 10px; border: 1px solid #FFD700; color: #FFD700; font-weight: bold; }

        .btn { background: #FFD700; color: #000; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin: 10px 0; }
        .input-code { width: 100%; padding: 10px; background: #000; border: 1px solid #4CAF50; color: #4CAF50; border-radius: 5px; margin-bottom: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div id="menuPage" class="overlay">
    <div class="card">
        <h1 style="color:#FFD700; margin-bottom: 20px;">CARROM ONLINE</h1>
        <button class="btn" onclick="hostGame()">CREATE PRIVATE ROOM</button>
        <p style="margin: 10px 0; color: #666;">— OR —</p>
        <input type="text" id="joinInput" class="input-code" placeholder="ENTER ROOM CODE">
        <button class="btn" style="background:#4CAF50" onclick="joinByCode()">JOIN ROOM</button>
    </div>
</div>

<div id="lobbyPage" class="overlay hidden">
    <div class="card">
        <h2 style="color:#FFD700">ROOM CREATED!</h2>
        <p style="font-size: 12px; margin: 10px 0;">Share this link with a friend:</p>
        <input type="text" id="shareUrl" class="input-code" readonly onclick="this.select()">
        <p style="color:#FFD700; font-size: 24px; font-weight: bold; letter-spacing: 5px;" id="displayCode"></p>
        <p id="statusMsg" style="color: #888; margin-top: 15px;">Waiting for friend to join...</p>
    </div>
</div>

<div id="scoreBoard" class="hidden">SCORE: <span id="score">0</span></div>
<div id="gameUI" class="hidden">
    <div class="slider-box">
        <input type="range" id="strikerPos" min="-3" max="3" step="0.1" value="0">
    </div>
</div>

<script>
/* --- GAME CONFIG & STATE --- */
let scene, camera, renderer, world, audioCtx;
let striker, strikerBody, aimingLine;
let pieces = [];
let isDragging = false, startPoint = new THREE.Vector2();
let score = 0;
let peer, conn, isHost = false;

/* --- NETWORKING LOGIC --- */
function hostGame() {
    const roomCode = Math.random().toString(36).substr(2, 6).toUpperCase();
    document.getElementById('displayCode').innerText = roomCode;
    const fullUrl = window.location.origin + window.location.pathname + "?room=" + roomCode;
    document.getElementById('shareUrl').value = fullUrl;
    
    document.getElementById('menuPage').classList.add('hidden');
    document.getElementById('lobbyPage').classList.remove('hidden');
    
    isHost = true;
    initPeer(roomCode);
}

function joinByCode() {
    const code = document.getElementById('joinInput').value.toUpperCase();
    if(code) window.location.search = "?room=" + code;
}

function initPeer(id) {
    peer = new Peer(id);
    peer.on('open', () => console.log("ID Registered: " + id));
    
    peer.on('connection', (c) => {
        conn = c;
        setupNetwork();
    });

    peer.on('error', (err) => {
        if(err.type === 'unavailable-id') alert("Room already exists or invalid!");
    });
}

function connectToHost(hostId) {
    peer = new Peer();
    peer.on('open', () => {
        conn = peer.connect(hostId);
        setupNetwork();
    });
}

function setupNetwork() {
    conn.on('open', () => {
        document.getElementById('lobbyPage').classList.add('hidden');
        document.getElementById('menuPage').classList.add('hidden');
        startGame();
    });

    conn.on('data', (data) => {
        if (isHost && data.type === 'SHOOT') {
            strikerBody.applyImpulse(new CANNON.Vec3(data.x, 0, data.z), strikerBody.position);
        } else if (!isHost && data.type === 'SYNC') {
            syncFromServer(data);
        }
    });
}

/* --- PHYSICS & GRAPHICS --- */
function startGame() {
    document.getElementById('scoreBoard').classList.remove('hidden');
    document.getElementById('gameUI').classList.remove('hidden');

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(0, 10, 8); camera.lookAt(0,0,0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 5); scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));

    world = new CANNON.World(); world.gravity.set(0, -9.8, 0);

    // Board
    const board = new THREE.Mesh(new THREE.BoxGeometry(9, 0.2, 9), new THREE.MeshStandardMaterial({ color: 0x4e342e }));
    scene.add(board);
    
    // Aim Line
    const mat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 0.2, gapSize: 0.1 });
    aimingLine = new THREE.Line(new THREE.BufferGeometry(), mat);
    aimingLine.visible = false; scene.add(aimingLine);

    // Striker
    striker = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.2, 32), new THREE.MeshStandardMaterial({ color: 0xffd700 }));
    scene.add(striker);
    strikerBody = new CANNON.Body({ mass: 1.5, linearDamping: 0.7 });
    strikerBody.addShape(new CANNON.Cylinder(0.4, 0.4, 0.2, 32));
    strikerBody.position.set(0, 0.2, 3);
    if(isHost) world.addBody(strikerBody);

    spawnCoins();
    setupInput();
    animate();
}

function spawnCoins() {
    for(let i=0; i<7; i++) {
        let angle = (i/6)*Math.PI*2, dist = i==0 ? 0 : 1.2;
        const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.15, 24), new THREE.MeshStandardMaterial({ color: i==0?0xff0066:0xffffff }));
        scene.add(mesh);
        const body = new CANNON.Body({ mass: 0.8, linearDamping: 0.7 });
        body.addShape(new CANNON.Cylinder(0.3, 0.3, 0.15, 24));
        body.position.set(Math.cos(angle)*dist, 0.2, Math.sin(angle)*dist);
        if(isHost) world.addBody(body);
        pieces.push({ mesh, body, id: i });
    }
}

function setupInput() {
    const slider = document.getElementById('strikerPos');
    slider.addEventListener('input', (e) => {
        if (isHost && strikerBody.velocity.length() < 0.1) {
            strikerBody.position.x = parseFloat(e.target.value);
        }
    });

    window.addEventListener('mousedown', e => { if(e.target.tagName !== 'INPUT') { isDragging = true; startPoint.set(e.clientX, e.clientY); }});
    window.addEventListener('mousemove', e => {
        if(!isDragging) return;
        aimingLine.visible = true;
        aimingLine.position.copy(striker.position);
        const dx = (startPoint.x - e.clientX)*0.05, dz = (startPoint.y - e.clientY)*0.05;
        aimingLine.geometry.setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(dx, 0, dz)]);
    });
    window.addEventListener('mouseup', e => {
        isDragging = false; aimingLine.visible = false;
        const fx = (startPoint.x - e.clientX)*0.2, fz = (startPoint.y - e.clientY)*0.2;
        if(isHost) strikerBody.applyImpulse(new CANNON.Vec3(fx, 0, fz), strikerBody.position);
        else conn.send({ type: 'SHOOT', x: fx, z: fz });
    });
}

function syncFromServer(data) {
    striker.position.set(data.s.x, 0.2, data.s.z);
    data.p.forEach(syncP => {
        const localP = pieces.find(lp => lp.id === syncP.id);
        if(localP) localP.mesh.position.set(syncP.x, 0.2, syncP.z);
    });
    document.getElementById('score').innerText = data.score;
}

function animate() {
    requestAnimationFrame(animate);
    if(isHost) {
        world.step(1/60);
        striker.position.copy(strikerBody.position);
        pieces.forEach(p => {
            p.mesh.position.copy(p.body.position);
            if(Math.abs(p.body.position.x) > 4.2 || Math.abs(p.body.position.z) > 4.2) {
                p.body.position.set(0, -5, 0); score++;
            }
        });
        if(conn) conn.send({ 
            type: 'SYNC', 
            s: {x: strikerBody.position.x, z: strikerBody.position.z},
            p: pieces.map(p => ({id: p.id, x: p.body.position.x, z: p.body.position.z})),
            score: score
        });
        document.getElementById('score').innerText = score;
    }
    renderer.render(scene, camera);
}

/* AUTO-JOIN CHECK */
window.onload = () => {
    const urlParams = new URLSearchParams(window.location.search);
    const room = urlParams.get('room');
    if(room) {
        document.getElementById('menuPage').classList.add('hidden');
        document.getElementById('statusMsg').innerText = "Connecting to room " + room + "...";
        document.getElementById('lobbyPage').classList.remove('hidden');
        connectToHost(room);
    }
};
</script>
</body>
</html>
