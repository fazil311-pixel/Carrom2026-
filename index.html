<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom Realistic Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.20.0/build/cannon.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui { position: fixed; top: 15px; width: 100%; text-align: center; color: #f1c40f; pointer-events: none; }
        .score-container { background: rgba(0,0,0,0.6); padding: 5px 20px; border-radius: 20px; border: 1px solid #f1c40f; display: inline-block; }
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        input[type=range] { width: 70%; accent-color: #f1c40f; pointer-events: auto; }
        .btn { background: #f1c40f; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>

<div id="ui">
    <div class="score-container">
        <div style="font-size: 10px; letter-spacing: 2px;">SCORE</div>
        <div id="scoreVal" style="font-size: 24px; font-weight: bold;">0</div>
    </div>
</div>

<div id="controls">
    <input type="range" id="strikerPos" min="-2.5" max="2.5" step="0.05" value="0">
    <button class="btn" onclick="resetBoard()">RESET BOARD</button>
</div>

<script>
let scene, camera, renderer, world, striker, strikerBody;
let pieces = [];
let score = 0;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);
    
    camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 13, 9);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const mainLight = new THREE.SpotLight(0xffffff, 1.5);
    mainLight.position.set(0, 15, 5);
    mainLight.castShadow = true;
    scene.add(mainLight, new THREE.AmbientLight(0xffffff, 0.4));

    world = new CANNON.World();
    world.gravity.set(0, -9.8, 0);
    
    // Friction Settings
    const groundMat = new CANNON.Material();
    const coinMat = new CANNON.Material();
    world.addContactMaterial(new CANNON.ContactMaterial(groundMat, coinMat, { friction: 0.1, restitution: 0.6 }));

    createBoard();
    resetBoard();
    setupInput();
    
    window.addEventListener('resize', onResize);
    animate();
}

function createBoard() {
    // Realistic Wooden Frame
    const frameGeo = new THREE.BoxGeometry(10.5, 0.8, 10.5);
    const frameMat = new THREE.MeshStandardMaterial({ color: 0x3d2b1f, roughness: 0.4 });
    const frame = new THREE.Mesh(frameGeo, frameMat);
    frame.position.y = 0.1;
    scene.add(frame);

    // Realistic Wooden Play Surface
    const boardGeo = new THREE.BoxGeometry(9.5, 0.2, 9.5);
    const boardMat = new THREE.MeshStandardMaterial({ color: 0xd2b48c, roughness: 0.2 });
    const board = new THREE.Mesh(boardGeo, boardMat);
    board.position.y = 0.2;
    board.receiveShadow = true;
    scene.add(board);

    // Physics Boundaries
    const floor = new CANNON.Body({ mass: 0 });
    floor.addShape(new CANNON.Plane());
    floor.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
    world.addBody(floor);
}

function createCoin(x, z, type) {
    let color, mass = 0.8;
    if (type === 'white') color = 0xffffff;
    else if (type === 'black') color = 0x222222;
    else if (type === 'red') color = 0xcc0000;
    else if (type === 'striker') { color = 0xf1c40f; mass = 1.6; }

    const radius = type === 'striker' ? 0.42 : 0.32;
    const mesh = new THREE.Mesh(
        new THREE.CylinderGeometry(radius, radius, 0.18, 32),
        new THREE.MeshStandardMaterial({ color: color, metalness: 0.3, roughness: 0.1 }) // Glossy Finish
    );
    mesh.castShadow = true;
    scene.add(mesh);

    const body = new CANNON.Body({ mass: mass, linearDamping: 0.6, angularDamping: 0.6 });
    body.addShape(new CANNON.Cylinder(radius, radius, 0.18, 32));
    body.position.set(x, 0.5, z);
    world.addBody(body);

    if (type === 'striker') {
        striker = mesh;
        strikerBody = body;
    } else {
        pieces.push({ mesh, body, active: true });
    }
}

function resetBoard() {
    // Clear old pieces
    pieces.forEach(p => { scene.remove(p.mesh); world.remove(p.body); });
    if(strikerBody) { scene.remove(striker); world.remove(strikerBody); }
    pieces = [];
    score = 0;
    document.getElementById('scoreVal').innerText = score;

    // Center Red (Queen)
    createCoin(0, 0, 'red');

    // Circle 1: 6 coins (alternating White/Black)
    for(let i=0; i<6; i++) {
        const a = (i/6) * Math.PI * 2;
        createCoin(Math.cos(a)*0.75, Math.sin(a)*0.75, i%2==0 ? 'white' : 'black');
    }

    // Circle 2: 12 coins (alternating)
    for(let i=0; i<12; i++) {
        const a = (i/12) * Math.PI * 2;
        createCoin(Math.cos(a)*1.45, Math.sin(a)*1.45, i%2==0 ? 'black' : 'white');
    }

    createCoin(0, 3.5, 'striker');
}

function setupInput() {
    const slider = document.getElementById('strikerPos');
    slider.oninput = () => {
        if(strikerBody.velocity.length() < 0.2) {
            strikerBody.position.x = parseFloat(slider.value);
            strikerBody.position.z = 3.5;
            strikerBody.velocity.set(0,0,0);
        }
    };

    let startX, startY, isDown = false;
    window.addEventListener('touchstart', e => { 
        if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
        isDown = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY; 
    });

    window.addEventListener('touchend', e => {
        if(!isDown) return;
        isDown = false;
        const fx = (startX - e.changedTouches[0].clientX) * 0.18;
        const fz = (startY - e.changedTouches[0].clientY) * 0.18;
        strikerBody.applyImpulse(new CANNON.Vec3(fx, 0, fz), strikerBody.position);
    });
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    world.step(1/60);
    
    striker.position.copy(strikerBody.position);
    striker.quaternion.copy(strikerBody.quaternion);

    pieces.forEach(p => {
        if(!p.active) return;
        p.mesh.position.copy(p.body.position);
        p.mesh.quaternion.copy(p.body.quaternion);

        // Pocket Detection
        if (Math.abs(p.body.position.x) > 4.6 || Math.abs(p.body.position.z) > 4.6) {
            p.active = false;
            scene.remove(p.mesh);
            world.remove(p.body);
            score += 10;
            document.getElementById('scoreVal').innerText = score;
        }
    });
    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
