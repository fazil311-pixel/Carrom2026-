<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom Pro - Aiming Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.20.0/build/cannon.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a3c3d; }
        
        /* FIX: Board is now forced to the background layer */
        canvas { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw !important; height: 100vh !important; 
            z-index: 1; 
            display: block;
        }

        #ui-layer { 
            position: relative; 
            z-index: 10; 
            pointer-events: none; 
            width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: space-between; 
        }

        .player-row { display: flex; justify-content: space-around; padding-top: 20px; }
        .player-box { 
            background: rgba(0,0,0,0.85); border: 2px solid #f1c40f; 
            padding: 12px; border-radius: 12px; color: #f1c40f; 
            min-width: 100px; text-align: center; font-family: sans-serif;
        }
        
        #controls { padding-bottom: 40px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        input[type=range] { width: 80%; accent-color: #f1c40f; pointer-events: auto; }
        .btn-row { display: flex; gap: 10px; pointer-events: auto; }
        .btn { background: rgba(0,0,0,0.7); border: 1px solid #f1c40f; color: #f1c40f; padding: 8px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="player-row">
        <div class="player-box">BACK<br><b style="font-size:24px;">0</b><br><small>COINS: 9</small></div>
        <div class="player-box" style="border-color:#e67e22; color:#e67e22;">X BACK<br><b style="font-size:24px;">0</b><br><small>COINS: 9</small></div>
    </div>

    <div id="controls">
        <div style="background:rgba(0,0,0,0.8); color:white; padding:6px 20px; border-radius:20px; border:1px solid #f1c40f; font-size:12px; letter-spacing:1px;">WHITE'S TURN</div>
        <input type="range" id="strikerPos" min="-2.8" max="2.8" step="0.05" value="0">
        <div class="btn-row">
            <button class="btn" onclick="location.reload()">RESET</button>
            <button class="btn" onclick="flipCamera()">FLIP</button>
            <button class="btn">SFX: ON</button>
        </div>
    </div>
</div>

<script>
let scene, camera, renderer, world, striker, strikerBody;
let aimingLine, aimingLineGeom, pieces = [];
let isFlipped = false;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a3c3d);

    camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 15, 0.1); 
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(light);

    world = new CANNON.World();
    world.gravity.set(0, -9.8, 0);

    createBoard();
    createAimingLine();
    spawnCoins();
    setupInput();
    animate();
}

function createBoard() {
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = "#e8d5a7"; ctx.fillRect(0,0,512,512);
    ctx.strokeStyle = "#5d4037"; ctx.lineWidth = 5;
    ctx.strokeRect(25,25,462,462); // Border
    ctx.beginPath(); ctx.arc(256, 256, 65, 0, Math.PI*2); ctx.stroke(); // Center

    const boardTex = new THREE.CanvasTexture(canvas);
    const board = new THREE.Mesh(new THREE.BoxGeometry(10, 0.4, 10), new THREE.MeshStandardMaterial({ map: boardTex }));
    scene.add(board);

    // Frame
    const fMat = new THREE.MeshStandardMaterial({ color: 0xf1c40f });
    const f1 = new THREE.Mesh(new THREE.BoxGeometry(10.6, 0.6, 0.4), fMat);
    f1.position.set(0, 0.2, 5.15); scene.add(f1);
    const f2 = f1.clone(); f2.position.set(0, 0.2, -5.15); scene.add(f2);
}

function createAimingLine() {
    const mat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 0.2, gapSize: 0.1 });
    aimingLineGeom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-5)]);
    aimingLine = new THREE.Line(aimingLineGeom, mat);
    aimingLine.visible = false;
    scene.add(aimingLine);
}

function spawnCoins() {
    // Striker
    striker = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.45, 0.2, 32), new THREE.MeshStandardMaterial({ color: 0xffffff }));
    scene.add(striker);
    strikerBody = new CANNON.Body({ mass: 1.5, linearDamping: 0.7 });
    strikerBody.addShape(new CANNON.Cylinder(0.45, 0.45, 0.2, 32));
    strikerBody.position.set(0, 0.5, 3.4);
    world.addBody(strikerBody);

    // Standard 19 Coins
    createPiece(0, 0, 0xff0000); // Queen
    for(let i=0; i<6; i++) {
        let a = (i/6)*Math.PI*2;
        createPiece(Math.cos(a)*0.9, Math.sin(a)*0.9, i%2==0?0x222222:0xffffff);
        createPiece(Math.cos(a)*1.7, Math.sin(a)*1.7, i%2==0?0xffffff:0x222222);
    }
}

function createPiece(x, z, col) {
    const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.2, 24), new THREE.MeshStandardMaterial({ color: col }));
    scene.add(mesh);
    const body = new CANNON.Body({ mass: 0.8, linearDamping: 0.7 });
    body.addShape(new CANNON.Cylinder(0.35, 0.35, 0.2, 24));
    body.position.set(x, 0.5, z);
    world.addBody(body);
    pieces.push({mesh, body});
}

function setupInput() {
    const slider = document.getElementById('strikerPos');
    slider.oninput = () => {
        if(strikerBody.velocity.length() < 0.1) {
            strikerBody.position.x = isFlipped ? -parseFloat(slider.value) : parseFloat(slider.value);
            strikerBody.position.z = isFlipped ? -3.4 : 3.4;
        }
    };

    let sx, sy, isD = false;
    window.addEventListener('touchstart', e => { 
        if(e.target.tagName !== 'CANVAS') return;
        isD = true; sx = e.touches[0].clientX; sy = e.touches[0].clientY; 
        aimingLine.visible = true;
    }, {passive: false});

    window.addEventListener('touchmove', e => {
        if(!isD) return;
        const dx = (sx - e.touches[0].clientX) * 0.05;
        const dz = (sy - e.touches[0].clientY) * 0.05;
        
        aimingLine.position.copy(strikerBody.position);
        aimingLine.rotation.y = Math.atan2(dx, dz);
        
        const len = Math.min(5, Math.sqrt(dx*dx + dz*dz) * 2);
        aimingLine.scale.z = len / 5;
        aimingLine.computeLineDistances();
    });

    window.addEventListener('touchend', e => {
        if(!isD) return; isD = false;
        aimingLine.visible = false;
        const fx = (sx - e.changedTouches[0].clientX) * 0.15;
        const fz = (sy - e.changedTouches[0].clientY) * 0.15;
        strikerBody.applyImpulse(new CANNON.Vec3(fx, 0, fz), strikerBody.position);
    });
}

function flipCamera() {
    isFlipped = !isFlipped;
    camera.rotation.z += Math.PI;
    strikerBody.position.z = isFlipped ? -3.4 : 3.4;
}

function animate() {
    requestAnimationFrame(animate);
    world.step(1/60);
    striker.position.copy(strikerBody.position);
    pieces.forEach(p => p.mesh.position.copy(p.body.position));
    renderer.render(scene, camera);
}

window.addEventListener('load', () => setTimeout(init, 250));
</script>
</body>
</html>
