<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carrom Realistic - Flip & SFX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.20.0/build/cannon.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a3c3d; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        #ui { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; z-index: 10; }
        .player-box { background: rgba(15, 15, 30, 0.9); border: 2px solid #f1c40f; padding: 12px; border-radius: 12px; color: #f1c40f; min-width: 100px; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .score-num { font-size: 28px; font-weight: bold; display: block; margin-top: 5px; }
        
        #controls { position: fixed; bottom: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 10; }
        .turn-pill { background: rgba(0,0,0,0.8); color: white; padding: 6px 20px; border-radius: 20px; font-size: 12px; border: 1px solid #f1c40f; letter-spacing: 1px; }
        input[type=range] { width: 75%; accent-color: #f1c40f; pointer-events: auto; }
        
        .btn-group { display: flex; gap: 10px; pointer-events: auto; }
        .side-btn { background: #2c3e50; color: #f1c40f; border: 1px solid #f1c40f; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .side-btn:active { background: #f1c40f; color: #000; }
    </style>
</head>
<body>

<div id="ui">
    <div class="player-box">BACK<span class="score-num" id="score1">0</span><small>COINS: 9</small></div>
    <div class="player-box" style="border-color:#e67e22; color:#e67e22;">X BACK<span class="score-num" id="score2">0</span><small>COINS: 9</small></div>
</div>

<div id="controls">
    <div class="turn-pill" id="turnLabel">WHITE'S TURN</div>
    <input type="range" id="strikerPos" min="-2.8" max="2.8" step="0.05" value="0">
    <div class="btn-group">
        <button class="side-btn" onclick="resetBoard()">Reset</button>
        <button class="side-btn" onclick="flipBoard()">Flip</button>
        <button class="side-btn" id="sfxBtn" onclick="toggleSFX()">SFX: ON</button>
    </div>
</div>

<script>
let scene, camera, renderer, world, striker, strikerBody, audioCtx;
let pieces = [];
let isFlipped = false;
let sfxEnabled = true;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a3c3d);

    camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 14, 0); 
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.AmbientLight(0xffffff, 0.9);
    scene.add(light);

    initPhysics();
    createBoard();
    resetBoard();
    setupInput();
    animate();

    window.addEventListener('mousedown', initAudio);
    window.addEventListener('touchstart', initAudio);
}

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playClack(vol) {
    if (!sfxEnabled || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(vol * 0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function initPhysics() {
    world = new CANNON.World();
    world.gravity.set(0, -9.8, 0);
    world.addEventListener('beginContact', (e) => {
        const vel = e.contact.getImpactVelocityAlongNormal();
        if (vel > 0.5) playClack(Math.min(vel/5, 1));
    });
}

function createBoardTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 1024; canvas.height = 1024;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = "#e8d5a7"; ctx.fillRect(0, 0, 1024, 1024);
    ctx.strokeStyle = "#5d4037"; ctx.lineWidth = 5;
    
    // Outer border & Pockets
    ctx.strokeRect(40, 40, 944, 944);
    ctx.fillStyle = "#000";
    [40, 984].forEach(x => [40, 984].forEach(y => {
        ctx.beginPath(); ctx.arc(x, y, 55, 0, Math.PI*2); ctx.fill();
    }));

    // Markings
    ctx.beginPath(); ctx.arc(512, 512, 130, 0, Math.PI*2); ctx.stroke();
    const baselines = [210, 814];
    baselines.forEach(y => {
        ctx.beginPath(); ctx.moveTo(210, y); ctx.lineTo(814, y); ctx.stroke();
        ctx.beginPath(); ctx.arc(210, y, 18, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.arc(814, y, 18, 0, Math.PI*2); ctx.stroke();
    });
    return new THREE.CanvasTexture(canvas);
}

function createBoard() {
    const board = new THREE.Mesh(new THREE.BoxGeometry(10, 0.2, 10), new THREE.MeshStandardMaterial({ map: createBoardTexture() }));
    scene.add(board);
    const frameMat = new THREE.MeshStandardMaterial({ color: 0xf1c40f });
    const f1 = new THREE.Mesh(new THREE.BoxGeometry(10.8, 0.7, 0.4), frameMat);
    f1.position.set(0, 0.25, 5.2); scene.add(f1);
    const f2 = f1.clone(); f2.position.set(0, 0.25, -5.2); scene.add(f2);
    const f3 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.7, 10.8), frameMat);
    f3.position.set(5.2, 0.25, 0); scene.add(f3);
    const f4 = f3.clone(); f4.position.set(-5.2, 0.25, 0); scene.add(f4);

    const floor = new CANNON.Body({ mass: 0 });
    floor.addShape(new CANNON.Plane());
    floor.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
    world.addBody(floor);
}

function createCoin(x, z, type) {
    let color = type === 'white' ? 0xffffff : (type === 'black' ? 0x222222 : 0xff3300);
    let radius = type === 'striker' ? 0.46 : 0.35;
    const mesh = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, 0.22, 32), new THREE.MeshStandardMaterial({ color: color, roughness: 0.1 }));
    scene.add(mesh);
    const body = new CANNON.Body({ mass: type === 'striker' ? 1.6 : 0.8, linearDamping: 0.65 });
    body.addShape(new CANNON.Cylinder(radius, radius, 0.22, 32));
    body.position.set(x, 0.4, z);
    world.addBody(body);
    if(type === 'striker') { striker = mesh; strikerBody = body; }
    else pieces.push({ mesh, body, active: true });
}

function resetBoard() {
    pieces.forEach(p => { scene.remove(p.mesh); world.remove(p.body); });
    if(strikerBody) { scene.remove(striker); world.remove(strikerBody); }
    pieces = [];
    createCoin(0, 0, 'red');
    for(let i=0; i<6; i++) {
        let a = (i/6)*Math.PI*2;
        createCoin(Math.cos(a)*0.85, Math.sin(a)*0.85, i%2==0?'white':'black');
        createCoin(Math.cos(a)*1.6, Math.sin(a)*1.6, i%2==0?'black':'white');
    }
    createCoin(0, 3.1, 'striker');
}

function flipBoard() {
    isFlipped = !isFlipped;
    camera.position.set(0, 14, isFlipped ? 0.1 : 0);
    camera.rotation.z = isFlipped ? Math.PI : 0;
    strikerBody.position.z = isFlipped ? -3.1 : 3.1;
    strikerBody.velocity.set(0,0,0);
}

function toggleSFX() {
    sfxEnabled = !sfxEnabled;
    document.getElementById('sfxBtn').innerText = `SFX: ${sfxEnabled ? 'ON' : 'OFF'}`;
}

function setupInput() {
    const slider = document.getElementById('strikerPos');
    slider.oninput = () => {
        if(strikerBody.velocity.length() < 0.1) {
            strikerBody.position.x = isFlipped ? -parseFloat(slider.value) : parseFloat(slider.value);
            strikerBody.position.z = isFlipped ? -3.1 : 3.1;
        }
    };
    let sx, sy, isD = false;
    window.addEventListener('touchstart', e => { if(e.target.tagName==='CANVAS'){ isD=true; sx=e.touches[0].clientX; sy=e.touches[0].clientY; }});
    window.addEventListener('touchend', e => {
        if(!isD) return; isD=false;
        let fx = (sx - e.changedTouches[0].clientX) * 0.18;
        let fz = (sy - e.changedTouches[0].clientY) * 0.18;
        if(isFlipped) { fx = -fx; fz = -fz; }
        strikerBody.applyImpulse(new CANNON.Vec3(fx, 0, fz), strikerBody.position);
    });
}

function animate() {
    requestAnimationFrame(animate);
    world.step(1/60);
    striker.position.copy(strikerBody.position);
    pieces.forEach(p => {
        if(p.active) {
            p.mesh.position.copy(p.body.position);
            if(Math.abs(p.body.position.x) > 4.7 || Math.abs(p.body.position.z) > 4.7) {
                scene.remove(p.mesh); world.remove(p.body); p.active = false;
                playClack(2);
            }
        }
    });
    renderer.render(scene, camera);
}
init();
</script>
</body>
</html>
